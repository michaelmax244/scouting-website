        /* ==================== HEADER STYLES ==================== */
.site-header {
    position: sticky;
    top: 0;
    z-index: 1000;
    background-color: rgba(245, 240, 230, 0.96);
    backdrop-filter: blur(10px);
    border-bottom: 2px solid #e6dfd3;
    padding: 0 32px;
    transition: all 0.3s ease;
}

.site-header.scrolled {
    background-color: rgba(245, 240, 230, 0.98);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    padding: 0 32px;
}

.header-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 70px;
}

/* الشعار */
.logo {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #1e3a2f;
    text-decoration: none;
    transition: all 0.3s ease;
    position: relative;
}

.logo:hover {
    color: #e26d3a;
    transform: scale(1.02);
}

.logo::before {
    content: '⚜️';
    margin-left: 8px;
    font-size: 1.4rem;
}

/* قائمة التنقل */
.nav-menu {
    display: flex;
    gap: 32px;
    font-weight: 500;
    font-size: 0.95rem;
}

.nav-menu a {
    text-decoration: none;
    color: #2b2823;
    transition: all 0.3s ease;
    position: relative;
    padding-bottom: 5px;
}

.nav-menu a:hover {
    color: #e26d3a;
}

.nav-menu a::after {
    content: '';
    position: absolute;
    bottom: 0;
    right: 0;
    width: 0;
    height: 2px;
    background: #e26d3a;
    transition: width 0.3s ease;
}

.nav-menu a:hover::after {
    width: 100%;
    left: 0;
    right: auto;
}

/* أيقونات الهيدر */
.header-icons {
    display: flex;
    gap: 25px;
    font-size: 1.2rem;
    align-items: center;
}

.header-icons a {
    color: #2b2823;
    text-decoration: none;
    transition: all 0.3s ease;
    position: relative;
}

.header-icons a:hover {
    color: #e26d3a;
    transform: translateY(-2px);
}

/* عداد السلة */
.cart-icon {
    position: relative;
}

.cart-icon .cart-badge {
    position: absolute;
    top: -10px;
    right: -12px;
    background: #e26d3a;
    color: white;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    font-size: 10px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    display: none;
    animation: bounce 0.3s ease;
}

@keyframes bounce {
    0% { transform: scale(0.8); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

/* زر القائمة المتنقلة (للشاشات الصغيرة) */
.mobile-menu-btn {
    display: none;
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: #1e3a2f;
    transition: 0.3s;
}

.mobile-menu-btn:hover {
    color: #e26d3a;
}

/* استجابة للشاشات الصغيرة */
@media (max-width: 900px) {
    .site-header {
        padding: 0 20px;
    }
    
    .header-inner {
        height: 65px;
    }
    
    .mobile-menu-btn {
        display: block;
    }
    
    .nav-menu {
        position: fixed;
        top: 65px;
        right: -100%;
        width: 80%;
        max-width: 300px;
        height: calc(100vh - 65px);
        background: rgba(30, 58, 47, 0.98);
        backdrop-filter: blur(10px);
        flex-direction: column;
        gap: 0;
        padding: 20px 0;
        transition: right 0.3s ease;
        z-index: 999;
        border-radius: 20px 0 0 20px;
    }
    
    .nav-menu.active {
        right: 0;
    }
    
    .nav-menu a {
        color: #f5ede2;
        padding: 15px 25px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        display: block;
    }
    
    .nav-menu a::after {
        display: none;
    }
    
    .nav-menu a:hover {
        background: rgba(226, 109, 58, 0.3);
        color: #f4c542;
    }
    
    .logo {
        font-size: 1.3rem;
    }
    
    .header-icons {
        gap: 15px;
    }
}

@media (max-width: 480px) {
    .logo {
        font-size: 1.1rem;
    }
    
    .logo::before {
        font-size: 1rem;
    }
    
    .header-icons {
        gap: 12px;
        font-size: 1rem;
    }
}

<script>
    // ==================== بيانات المنتجات الكاملة (نفس بيانات shop.html) ====================
    const allProducts = [
        { id: 1, name: "قميص مينا ايمن شوقي باشا ابو الخير القاضي", price: 320, category: "قمصان", image: "images/قميص 1.png" },
        { id: 2, name: "قميص جونير", price: 210, category: "قمصان", image: "images/قميص 2.png" },
        { id: 3, name: "قميص كشافة (قادة)", price: 85, category: "قمصان", image: "images/قميص 3.png" },
        { id: 4, name: "جاكيت ضد الماء للرحلات المائية", price: 490, category: "قمصان", image: "images/جاكيت مائي.png" },
        { id: 5, name: "جوانتي لتحمل الحرارة و الصدمات", price: 150, category: "إكسسوارات", image: "images/جوانتي.png" },
        { id: 6, name: "منديل الشارة الخشبية", price: 95, category: "إكسسوارات", image: "images/منديل خشبية.png" },
        { id: 7, name: "منديل شارة متقدم", price: 120, category: "إكسسوارات", image: "images/منديل متقدم.png" },
        { id: 8, name: "منديلة شارة اشبال", price: 110, category: "إكسسوارات", image: "images/منديل اشبال.png" },
        { id: 9, name: "قميص صيفي", price: 180, category: "قمصان", image: "images/summer-shirt.png" },
        { id: 10, name: "حذاء كشفي", price: 450, category: "إكسسوارات", image: "images/shoes.png" },
        { id: 11, name: "قبعة كشفية", price: 75, category: "إكسسوارات", image: "images/hat.png" },
        { id: 12, name: "دليل القائد الكشفي", price: 180, category: "شارات", image: "images/book.png" }
    ];

    // دالة للحصول على صورة المنتج من المعرف
    function getProductImage(productId) {
        const product = allProducts.find(p => p.id === productId);
        return product ? product.image : '../images/product.png';
    }

    let cart = JSON.parse(localStorage.getItem('scout_cart')) || [];

    function updateCartBadge() {
        const badge = document.getElementById('cartCountBadge');
        if (!badge) return;
        const total = cart.reduce((sum, item) => sum + item.quantity, 0);
        badge.textContent = total;
        badge.style.display = total > 0 ? 'flex' : 'none';
    }

    function saveCart() {
        localStorage.setItem('scout_cart', JSON.stringify(cart));
        updateCartBadge();
        renderCart();
    }

    function updateQuantity(id, change) {
        const item = cart.find(i => i.id === id);
        if (item) {
            item.quantity += change;
            if (item.quantity <= 0) {
                cart = cart.filter(i => i.id !== id);
            }
            saveCart();
        }
    }

    function removeItem(id) {
        cart = cart.filter(i => i.id !== id);
        saveCart();
    }

    function renderCart() {
        const container = document.getElementById('cartContent');
        
        if (cart.length === 0) {
            container.innerHTML = `<div class="empty-cart"><i class="fas fa-shopping-cart"></i><h2>سلة التسوق فارغة</h2><p>أضف بعض المنتجات إلى السلة</p><a href="../shop.html" style="display: inline-block; margin-top: 15px; background: #e26d3a; color: white; padding: 12px 30px; border-radius: 40px; text-decoration: none;">تسوق الآن</a></div>`;
            return;
        }

        let itemsHtml = '<div class="cart-grid"><div class="cart-items">';
        let subtotal = 0;

        cart.forEach(item => {
            const itemTotal = item.price * item.quantity;
            subtotal += itemTotal;
            // الحصول على صورة المنتج الحقيقية من قاعدة البيانات
            const productImage = getProductImage(item.id);
            itemsHtml += `
                <div class="cart-item">
                    <div class="cart-item-img"><img src="${productImage}" alt="${item.name}" onerror="this.src='../images/product.png'"></div>
                    <div class="cart-item-details">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-price">${item.price} ج.م</div>
                        <div class="cart-item-quantity">
                            <button class="quantity-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button class="quantity-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                        </div>
                    </div>
                    <div class="cart-item-total">${itemTotal} ج.م</div>
                    <button class="remove-item" onclick="removeItem(${item.id})"><i class="fas fa-trash-alt"></i></button>
                </div>
            `;
        });

        itemsHtml += `</div><div class="cart-summary"><h3>ملخص الطلب</h3>`;
        
        let shippingCost = 20;
        if (subtotal >= 2000) shippingCost = 0;
        
        const total = subtotal + shippingCost;
        
        itemsHtml += `
            <div class="summary-row"><span>عدد المنتجات</span><span>${cart.reduce((s, i) => s + i.quantity, 0)}</span></div>
            <div class="summary-row"><span>المجموع الفرعي</span><span>${subtotal} ج.م</span></div>
            <div class="summary-row"><span>الشحن والتوصيل</span><span>${shippingCost === 0 ? 'مجاني' : shippingCost + ' ج.م'}</span></div>
            <div class="summary-total"><span>المجموع الكلي</span><span>${total} ج.م</span></div>
            <button class="checkout-btn" onclick="goToCheckout()">الدفع الآن <i class="fas fa-arrow-left"></i></button>
        `;
        
        itemsHtml += `</div></div>`;
        container.innerHTML = itemsHtml;
    }

    function goToCheckout() {
        if (cart.length === 0) {
            alert('سلة التسوق فارغة');
            return;
        }
        window.location.href = '../Pay-wish.html';
    }

    renderCart();
    updateCartBadge();
    // ==================== HEADER FUNCTIONS ====================

// تحديث عداد السلة
function updateCartBadge() {
    const cartBadge = document.getElementById('cartCountBadge');
    if (!cartBadge) return;
    
    let cart = JSON.parse(localStorage.getItem('scout_cart')) || [];
    const totalItems = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
    
    if (totalItems > 0) {
        cartBadge.textContent = totalItems;
        cartBadge.style.display = 'flex';
        cartBadge.style.animation = 'none';
        setTimeout(() => {
            cartBadge.style.animation = 'bounce 0.3s ease';
        }, 10);
    } else {
        cartBadge.style.display = 'none';
    }
}

// تأثير التمرير على الهيدر (يغير الشفافية عند التمرير)
function handleHeaderScroll() {
    const header = document.querySelector('.site-header');
    if (!header) return;
    
    if (window.scrollY > 50) {
        header.classList.add('scrolled');
    } else {
        header.classList.remove('scrolled');
    }
}

// إنشاء زر القائمة المتنقلة للأجهزة الصغيرة
function createMobileMenuButton() {
    const headerInner = document.querySelector('.header-inner');
    const navMenu = document.querySelector('.nav-menu');
    const existingBtn = document.querySelector('.mobile-menu-btn');
    
    if (existingBtn) return;
    
    if (headerInner && navMenu && window.innerWidth <= 900) {
        const menuBtn = document.createElement('button');
        menuBtn.className = 'mobile-menu-btn';
        menuBtn.innerHTML = '<i class="fas fa-bars"></i>';
        menuBtn.setAttribute('aria-label', 'القائمة');
        
        // إضافة الزر قبل أيقونات الهيدر
        const headerIcons = document.querySelector('.header-icons');
        if (headerIcons) {
            headerInner.insertBefore(menuBtn, headerIcons);
        } else {
            headerInner.appendChild(menuBtn);
        }
        
        menuBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            navMenu.classList.toggle('active');
            const icon = this.querySelector('i');
            if (navMenu.classList.contains('active')) {
                icon.className = 'fas fa-times';
                document.body.style.overflow = 'hidden';
            } else {
                icon.className = 'fas fa-bars';
                document.body.style.overflow = '';
            }
        });
        
        // إغلاق القائمة عند الضغط خارجها
        document.addEventListener('click', function(event) {
            if (!navMenu.contains(event.target) && !menuBtn.contains(event.target) && navMenu.classList.contains('active')) {
                navMenu.classList.remove('active');
                menuBtn.innerHTML = '<i class="fas fa-bars"></i>';
                document.body.style.overflow = '';
            }
        });
    }
}

// تحديث إعدادات القائمة عند تغيير حجم الشاشة
function handleResize() {
    const navMenu = document.querySelector('.nav-menu');
    const menuBtn = document.querySelector('.mobile-menu-btn');
    
    if (window.innerWidth > 900) {
        if (navMenu) navMenu.classList.remove('active');
        if (menuBtn) menuBtn.remove();
        document.body.style.overflow = '';
    } else {
        if (!document.querySelector('.mobile-menu-btn')) {
            createMobileMenuButton();
        }
    }
}

// إضافة تأثير نشاط للرابط الحالي
function setActiveNavLink() {
    const currentPage = window.location.pathname.split('/').pop();
    const navLinks = document.querySelectorAll('.nav-menu a');
    
    navLinks.forEach(link => {
        const linkPage = link.getAttribute('href');
        if (linkPage === currentPage || (currentPage === '' && linkPage === 'index.html')) {
            link.style.color = '#e26d3a';
            link.style.fontWeight = 'bold';
        } else {
            link.style.color = '';
            link.style.fontWeight = '';
        }
    });
}

// تهيئة الهيدر عند تحميل الصفحة
document.addEventListener('DOMContentLoaded', function() {
    updateCartBadge();
    setActiveNavLink();
    createMobileMenuButton();
    window.addEventListener('scroll', handleHeaderScroll);
    window.addEventListener('resize', handleResize);
});

// تحديث عداد السلة عند إضافة منتجات (يمكن استدعاؤها من صفحات أخرى)
window.updateCartBadge = updateCartBadge;
</script>
