<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
        <link rel="icon" type="image/png" href="images/favicon.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدفع | المتجر الكشفي</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #f5f0e6; font-family: 'Inter', sans-serif; }
        .container { max-width: 1280px; margin: 0 auto; padding: 30px 20px; }
        .checkout-title { font-size: 2rem; font-weight: 800; margin-bottom: 30px; color: #1f1c17; }
        .checkout-grid { display: flex; gap: 30px; flex-wrap: wrap; }
        .products-list { flex: 2; min-width: 300px; background: white; border-radius: 28px; padding: 25px; }
        .order-summary { flex: 1; min-width: 300px; background: white; border-radius: 28px; padding: 25px; height: fit-content; position: sticky; top: 20px; }
        .checkout-item { display: flex; gap: 15px; padding: 15px 0; border-bottom: 1px solid #e6dfd3; align-items: center; }
        .checkout-item-img { width: 70px; height: 70px; border-radius: 12px; overflow: hidden; background: #f5f0e6; }
        .checkout-item-img img { width: 100%; height: 100%; object-fit: cover; }
        .checkout-item-info { flex: 1; }
        .checkout-item-name { font-weight: 700; margin-bottom: 5px; }
        .checkout-item-price { color: #e26d3a; font-weight: 600; font-size: 0.9rem; }
        .checkout-item-total { font-weight: 700; color: #1e3a2f; min-width: 80px; text-align: left; }
        .summary-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #e6dfd3; }
        .summary-total { font-size: 1.3rem; font-weight: 800; color: #e26d3a; margin-top: 15px; padding-top: 15px; border-top: 2px solid #e26d3a; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #1f1c17; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px 16px; border: 2px solid #e6dfd3; border-radius: 30px; font-size: 1rem; outline: none; }
        .form-group input:focus { border-color: #e26d3a; }
        .submit-btn { width: 100%; background: #e26d3a; color: white; border: none; padding: 15px; border-radius: 50px; font-weight: 700; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .submit-btn:hover { background: #c75c2e; }
        .map-btn { background: #1e3a2f; color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; margin-bottom: 20px; width: 100%; }
        .success-box { background: #d4edda; color: #155724; padding: 20px; border-radius: 20px; text-align: center; margin-top: 20px; }
        .status-badge { display: inline-block; background: #ffc107; color: #856404; padding: 5px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: 600; margin-top: 5px; }
        
        /* نافذة منبثقة مخصصة */
        .custom-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            background: white;
            border-radius: 32px;
            padding: 30px 40px;
            text-align: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
        }
        .custom-popup.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }
        .custom-popup i {
            font-size: 4rem;
            margin-bottom: 15px;
        }
        .custom-popup .success-icon {
            color: #2a7a3e;
        }
        .custom-popup .warning-icon {
            color: #e26d3a;
        }
        .custom-popup h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #1f1c17;
        }
        .custom-popup p {
            color: #5b5549;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .custom-popup button {
            background: #e26d3a;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 9999;
            display: none;
        }
        .popup-overlay.show {
            display: block;
        }
        
        @media (max-width: 768px) { .checkout-grid { flex-direction: column; } }
        /* ==================== RESPONSIVE CODE - لجميع الأجهزة ==================== */
/* يمكنك إضافة هذا الكود في نهاية الـ style في كل صفحة */

/* Extra Small Devices (موبايل صغير جداً - iPhone SE, Galaxy Fold) */
@media (max-width: 480px) {
    /* الهيدر */
    .site-header {
        padding: 0 15px;
    }
    .header-inner {
        height: 55px;
    }
    .logo {
        font-size: 1.1rem;
    }
    .logo::before {
        font-size: 0.9rem;
    }
    .nav-menu a {
        font-size: 0.8rem;
        padding: 12px 15px;
    }
    .header-icons {
        gap: 12px;
        font-size: 1rem;
    }
    .cart-badge {
        width: 16px;
        height: 16px;
        font-size: 9px;
        top: -8px;
        right: -8px;
    }
    
    /* الحاوية الرئيسية */
    .container {
        padding: 0 15px;
    }
    
    /* العناوين */
    .page-title {
        font-size: 1.6rem;
    }
    .hero-headline {
        font-size: 1.8rem;
    }
    .hero-desc {
        font-size: 0.85rem;
    }
    
    /* الأزرار */
    .btn-primary, .btn-add-cart, .btn-buy-now {
        padding: 10px 20px;
        font-size: 0.85rem;
    }
    
    /* شريط الفلترة */
    .filter-bar {
        flex-direction: column;
        gap: 15px;
    }
    .filter-group {
        justify-content: center;
        gap: 10px;
    }
    .filter-dropdown {
        padding: 6px 12px;
        font-size: 0.75rem;
    }
    .sort-select {
        padding: 8px 15px;
        font-size: 0.8rem;
    }
    
    /* المنتجات */
    .product-grid {
        grid-template-columns: 1fr;
        gap: 20px;
    }
    .product-card {
        max-width: 100%;
    }
    .product-title {
        font-size: 0.9rem;
    }
    .product-price {
        font-size: 1rem;
    }
    
    /* الفوتر */
    .footer-grid {
        flex-direction: column;
        gap: 30px;
        text-align: center;
    }
    .footer-col h4:after {
        right: 50%;
        transform: translateX(50%);
    }
    .footer-bottom {
        flex-direction: column;
        text-align: center;
        gap: 15px;
    }
    .social-icons-footer {
        justify-content: center;
    }
    .payment-methods {
        justify-content: center;
    }
    
    /* البانر */
    .hero-banner {
        padding: 20px;
        flex-direction: column;
        text-align: center;
    }
    .banner-text h2 {
        font-size: 1.3rem;
    }
    .banner-img {
        max-width: 150px;
        margin-top: 15px;
    }
    
    /* الصفحات الداخلية */
    .product-detail {
        padding: 20px;
    }
    .product-title-detail {
        font-size: 1.3rem;
    }
    .product-price-detail {
        font-size: 1.5rem;
    }
    .quantity-selector {
        justify-content: center;
    }
    .action-buttons {
        flex-direction: column;
    }
    
    /* السلة */
    .cart-item {
        flex-direction: column;
        text-align: center;
    }
    .cart-item-img {
        margin: 0 auto;
    }
    .cart-item-total {
        text-align: center;
        margin-top: 10px;
    }
    .cart-summary {
        position: static;
        margin-top: 20px;
    }
    
    /* التسجيل والدخول */
    .registration-card, .login-container, .signup-container {
        padding: 25px 20px;
    }
    .registration-card h2, .login-container h1, .signup-container h1 {
        font-size: 1.5rem;
    }
    .reg-input {
        padding: 10px 14px;
    }
}

/* Small Devices (موبايل متوسط وكبير - 481px to 768px) */
@media (min-width: 481px) and (max-width: 768px) {
    .site-header {
        padding: 0 20px;
    }
    .header-inner {
        height: 60px;
    }
    .logo {
        font-size: 1.3rem;
    }
    .nav-menu a {
        font-size: 0.85rem;
        padding: 12px 20px;
    }
    .container {
        padding: 0 20px;
    }
    .page-title {
        font-size: 2rem;
    }
    .hero-headline {
        font-size: 2rem;
    }
    .product-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
    }
    .filter-bar {
        flex-direction: column;
        gap: 15px;
    }
    .filter-group {
        justify-content: center;
    }
    .footer-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 30px;
    }
    .hero-banner {
        padding: 25px;
    }
    .banner-text h2 {
        font-size: 1.5rem;
    }
    .product-detail {
        flex-direction: column;
        padding: 25px;
    }
    .checkout-grid {
        flex-direction: column;
    }
    .cart-summary {
        position: static;
        margin-top: 20px;
    }
}

/* Medium Devices (تابلت - 769px to 1024px) */
@media (min-width: 769px) and (max-width: 1024px) {
    .container {
        max-width: 960px;
        padding: 0 25px;
    }
    .product-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 25px;
    }
    .hero-headline {
        font-size: 2.5rem;
    }
    .footer-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 40px;
    }
    .product-detail {
        padding: 30px;
    }
}

/* Large Devices (لاب توب صغير - 1025px to 1280px) */
@media (min-width: 1025px) and (max-width: 1280px) {
    .container {
        max-width: 1100px;
    }
    .product-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 30px;
    }
}

/* Extra Large Devices (شاشات كبيرة 4K - 1921px and above) */
@media (min-width: 1921px) {
    .container {
        max-width: 1600px;
    }
    body {
        font-size: 1.1rem;
    }
    .page-title {
        font-size: 3.5rem;
    }
    .hero-headline {
        font-size: 4rem;
    }
    .product-grid {
        grid-template-columns: repeat(5, 1fr);
        gap: 35px;
    }
    .btn-primary, .btn-add-cart, .btn-buy-now {
        padding: 16px 40px;
        font-size: 1.1rem;
    }
}

/* ==================== ميزات إضافية لتحسين التجربة ==================== */

/* تحسين اللمس على الموبايل */
@media (max-width: 768px) {
    button, 
    .btn-primary, 
    .btn-add-cart, 
    .btn-buy-now,
    .filter-dropdown,
    .detail-btn,
    .nav-menu a,
    .header-icons a,
    .product-card,
    .quantity-btn,
    .page-number,
    .scouting-btn {
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
    }
    
    /* تكبير مساحة النقر */
    .nav-menu a {
        padding: 14px 20px;
    }
    .filter-dropdown {
        padding: 8px 16px;
    }
    .quantity-btn {
        width: 44px;
        height: 44px;
    }
    
    /* منع التكبير التلقائي على iOS */
    input, select, textarea {
        font-size: 16px;
    }
}

/* تحسين التمرير */
html {
    scroll-behavior: smooth;
}

/* تحسين عرض الصور */
img {
    max-width: 100%;
    height: auto;
}

/* تحسين الجداول على الموبايل */
@media (max-width: 768px) {
    table, thead, tbody, th, td, tr {
        display: block;
    }
    thead tr {
        position: absolute;
        top: -9999px;
        left: -9999px;
    }
    tr {
        margin-bottom: 15px;
        border: 1px solid #e6dfd3;
        border-radius: 16px;
        padding: 10px;
    }
    td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 12px;
        border-bottom: 1px solid #e6dfd3;
    }
    td:before {
        content: attr(data-label);
        font-weight: bold;
        margin-left: 10px;
    }
}

/* تحسين عرض الفيديو على الموبايل */
.video-container {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    overflow: hidden;
}
.video-container video {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}
    </style>
</head>
<body>

<main>
    <div class="container">
        <h1 class="checkout-title">💳 إتمام الطلب</h1>
        <div id="checkoutContent"></div>
    </div>
</main>

<!-- نافذة منبثقة مخصصة -->
<div id="popupOverlay" class="popup-overlay"></div>
<div id="customPopup" class="custom-popup">
    <i class="fas fa-check-circle success-icon"></i>
    <h3>✅ تم استلام طلبك بنجاح!</h3>
    <p>جاري مراجعة طلبك<br>سيتم إرساله إليك في أقصر مدة 📦</p>
    <button onclick="closePopupAndRedirect()">حسناً</button>
</div>

<script>
    let cart = JSON.parse(localStorage.getItem('scout_cart')) || [];
    let orderPlaced = false;

    // دالة إظهار النافذة المنبثقة
    function showSuccessPopup() {
        const overlay = document.getElementById('popupOverlay');
        const popup = document.getElementById('customPopup');
        overlay.classList.add('show');
        popup.classList.add('show');
    }

    // دالة إغلاق النافذة والتحويل للصفحة الرئيسية
    function closePopupAndRedirect() {
        const overlay = document.getElementById('popupOverlay');
        const popup = document.getElementById('customPopup');
        overlay.classList.remove('show');
        popup.classList.remove('show');
        window.location.href = 'index.html';
    }

    // دالة الحصول على البريد الإلكتروني للمستخدم الحالي
    function getCurrentUserEmail() {
        const currentUser = localStorage.getItem('current_user');
        if (currentUser) {
            try {
                const user = JSON.parse(currentUser);
                return user.email || '';
            } catch(e) {
                return '';
            }
        }
        return '';
    }

    function renderCheckout() {
        if (cart.length === 0) {
            document.getElementById('checkoutContent').innerHTML = `<div style="text-align:center; padding:60px; background:white; border-radius:28px;"><i class="fas fa-cart-empty" style="font-size:4rem; color:#c1b6a4;"></i><h2>لا توجد منتجات للدفع</h2><a href="shop.html" style="display:inline-block; margin-top:15px; background:#e26d3a; color:white; padding:12px 30px; border-radius:40px; text-decoration:none;">تسوق الآن</a></div>`;
            return;
        }

        let subtotal = 0;
        let productsHtml = `<div class="checkout-grid"><div class="products-list"><h3>📦 المنتجات المطلوبة</h3>`;
        
        cart.forEach(item => {
            const itemTotal = item.price * item.quantity;
            subtotal += itemTotal;
            productsHtml += `
                <div class="checkout-item">
                    <div class="checkout-item-img"><img src="${item.image || 'images/product.png'}" alt="${item.name}"></div>
                    <div class="checkout-item-info">
                        <div class="checkout-item-name">${item.name}</div>
                        <div class="checkout-item-price">${item.price} ج.م × ${item.quantity}</div>
                        <div class="status-badge">قيد التنفيذ</div>
                    </div>
                    <div class="checkout-item-total">${itemTotal} ج.م</div>
                </div>
            `;
        });
        
        let shippingCost = subtotal >= 2000 ? 0 : 20;
        let total = subtotal + shippingCost;
        
        productsHtml += `</div><div class="order-summary"><h3>🧾 ملخص الطلب</h3>
            <div class="summary-row"><span>عدد المنتجات</span><span>${cart.reduce((s, i) => s + i.quantity, 0)}</span></div>
            <div class="summary-row"><span>المجموع الفرعي</span><span>${subtotal} ج.م</span></div>
            <div class="summary-row"><span>الشحن والتوصيل</span><span>${shippingCost === 0 ? 'مجاني' : shippingCost + ' ج.م'}</span></div>
            <div class="summary-total"><span>المجموع الكلي</span><span>${total} ج.م</span></div>`;
        
        if (!orderPlaced) {
            productsHtml += `
                <button class="map-btn" id="openMapBtn"><i class="fas fa-map-marker-alt"></i> تحديد العنوان عبر خرائط جوجل</button>
                <form id="checkoutForm">
                    <div class="form-group"><label>الاسم الكامل</label><input type="text" id="fullName" required placeholder="أدخل اسمك"></div>
                    <div class="form-group"><label>رقم الهاتف الأساسي</label><input type="tel" id="phone" required placeholder="01234567890"></div>
                    <div class="form-group"><label>رقم الهاتف البديل</label><input type="tel" id="altPhone" placeholder="01123456789"></div>
                    <div class="form-group"><label>العنوان التفصيلي</label><textarea id="address" rows="2" required placeholder="العنوان بالكامل"></textarea></div>
                    <button type="submit" class="submit-btn">تأكيد الطلب <i class="fas fa-check"></i></button>
                </form>
            `;
        } else {
            productsHtml += `<div class="success-box"><i class="fas fa-check-circle" style="font-size:3rem;"></i><h3>تم استلام طلبك بنجاح!</h3><p>سيتم التواصل معك قريباً لتأكيد الطلب</p><a href="index.html" style="display:inline-block; margin-top:15px; background:#1e3a2f; color:white; padding:10px 25px; border-radius:40px; text-decoration:none;">العودة للرئيسية</a></div>`;
        }
        
        productsHtml += `</div></div>`;
        document.getElementById('checkoutContent').innerHTML = productsHtml;
        
        if (!orderPlaced) {
            document.getElementById('openMapBtn')?.addEventListener('click', function() {
                window.open('https://www.google.com/maps', '_blank');
                alert('📍 يرجى تحديد موقعك على الخريطة ثم نسخ العنوان');
            });
            
            document.getElementById('checkoutForm')?.addEventListener('submit', function(e) {
                e.preventDefault();
                const fullName = document.getElementById('fullName').value;
                const phone = document.getElementById('phone').value;
                const address = document.getElementById('address').value;
                const altPhone = document.getElementById('altPhone').value;
                
                if (!fullName || !phone || !address) {
                    alert('الرجاء ملء جميع الحقول الأساسية');
                    return;
                }
                
                // الحصول على البريد الإلكتروني للمستخدم الحالي
                const userEmail = getCurrentUserEmail();
                
                // حفظ الطلب
                const order = {
                    id: Date.now(),
                    date: new Date().toISOString(),
                    customer: { 
                        fullName: fullName, 
                        phone: phone, 
                        altPhone: altPhone, 
                        email: userEmail,
                        address: address 
                    },
                    items: [...cart],
                    subtotal: subtotal,
                    shipping: shippingCost,
                    total: total,
                    status: 'قيد التنفيذ'
                };
                
                let orders = JSON.parse(localStorage.getItem('scout_orders')) || [];
                orders.push(order);
                localStorage.setItem('scout_orders', JSON.stringify(orders));
                
                // تفريغ السلة
                localStorage.removeItem('scout_cart');
                cart = [];
                
                orderPlaced = true;
                
                // إظهار النافذة المنبثقة بدلاً من التحديث المباشر
                showSuccessPopup();
            });
        }
    }
    
    renderCheckout();
</script>
</body>
</html>
